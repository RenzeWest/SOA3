name: SonarQube Analysis

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build, Test & Analyze
    runs-on: windows-latest

    steps:
      # Set up JDK (SonarCloud requirement)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Cache SonarCloud packages
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # Cache dotnet-sonarscanner tool
      - name: Cache SonarScanner tool
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      # Install dotnet-sonarscanner if not cached
      - name: Install SonarScanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path ${{ runner.temp }}\scanner -ItemType Directory
          dotnet tool install dotnet-sonarscanner --tool-path ${{ runner.temp }}\scanner

     # Build, test and analyze
      - name: Build, Test and Analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          # 6a️⃣ Start SonarScanner analysis
          $scanner = "${{ runner.temp }}\scanner\dotnet-sonarscanner"
          $scanner begin `
            /k:"RenzeWest_SOA3" `
            /o:"renzewest" `
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" `
            /d:sonar.cs.opencover.reportsPaths="$(pwd)\SOA3.Tests\TestResults\coverage.opencover.xml" `
            /d:sonar.cs.vstest.reportsPaths="$(pwd)\SOA3.Tests\TestResults\TestResults.trx"

          # 6b️⃣ Build solution
          dotnet build --no-incremental

          # 6c️⃣ Run tests with coverage
          dotnet test --no-build `
            --logger "trx;LogFileName=TestResults.trx" `
            /p:CollectCoverage=true `
            /p:CoverletOutput="$(pwd)\SOA3.Tests\TestResults\coverage.opencover.xml" `
            /p:CoverletOutputFormat=opencover

          # 6d️⃣ Debug: check that coverage file exists
          Write-Host "Files in TestResults folder:"
          Get-ChildItem "$(pwd)\SOA3.Tests\TestResults"

          # 6e️⃣ End SonarScanner analysis
          $scanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
